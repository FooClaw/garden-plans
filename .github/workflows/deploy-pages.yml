name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy numpy-stl matplotlib

      - name: Generate project outputs
        run: |
          for dir in */; do
            if [ -f "${dir}generate_table.py" ]; then
              echo "=== Building ${dir} ==="
              cd "$dir"
              python generate_table.py
              [ -f generate_guide.py ] && python generate_guide.py
              [ -f generate_nomenclature.py ] && python generate_nomenclature.py
              cd ..
            fi
          done

      - name: List site contents
        run: |
          echo "=== Site files ==="
          find . -name "*.html" -o -name "*.pdf" -o -name "*.stl" | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
