name: PR Preview (Netlify)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy numpy-stl matplotlib

      - name: Generate project outputs
        run: |
          for dir in */; do
            if [ -f "${dir}generate_table.py" ]; then
              echo "=== Building ${dir} ==="
              cd "$dir"
              python generate_table.py
              [ -f generate_guide.py ] && python generate_guide.py
              [ -f generate_nomenclature.py ] && python generate_nomenclature.py
              cd ..
            fi
          done

      - name: Verify generated files
        run: |
          echo "=== Generated files ==="
          find . -name "*.stl" -o -name "*.pdf" | sort

  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.NETLIFY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy numpy-stl matplotlib

      - name: Generate outputs
        run: |
          for dir in */; do
            if [ -f "${dir}generate_table.py" ]; then
              cd "$dir"
              python generate_table.py
              [ -f generate_guide.py ] && python generate_guide.py
              [ -f generate_nomenclature.py ] && python generate_nomenclature.py
              cd ..
            fi
          done

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: .
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
